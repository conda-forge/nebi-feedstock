context:
  version: "0.9"

recipe:
  name: nebi-packages
  version: ${{ version }}

source:
  url: https://github.com/nebari-dev/nebi/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a9af97cbadfa4218bc0ba229bf989f3c5ec8f72c30f3435bf3e4e9efd7f27d16
  target_directory: src

build:
  number: 0

outputs:
  - package:
      name: nebi-desktop
      version: ${{ version }}
    build:
      script:
        - if: unix
          then: build-desktop.sh
        - if: win
          then: build-desktop.bat
    requirements:
      build:
        - ${{ compiler("go-cgo") }}
        - ${{ compiler("c") }}
        - ${{ compiler("cxx") }}
        - ${{ stdlib("c") }}
        - go-licenses
        - nodejs >=20
        - if: linux
          then:
            - pkg-config
      host:
        - if: linux
          then:
            - gtk3
            - webkit2gtk4.1
            - glib
            - libsoup
            - gdk-pixbuf
            - zlib
            - expat
            - fontconfig
      run:
        - menuinst >=2.1
      ignore_run_exports:
        from_package:
          - if: linux
            then:
              - zlib
              - expat
              - fontconfig
    tests:
      - script:
          - if: unix
            then:
              - test -f $PREFIX/bin/nebi-desktop
          - if: win
            then:
              - if exist %LIBRARY_BIN%\nebi-desktop.exe (exit 0) else (exit 1)
      - package_contents:
          files:
            - Menu/nebi-desktop-menu.json
    about:
      summary: Nebi desktop application - local-first workspace management for Pixi
      description: |
        Nebi Desktop is a native desktop application for managing Pixi workspaces.
        It provides a graphical interface for tracking, pushing, and pulling
        workspace configurations with built-in web UI.

  - package:
      name: nebi-cli
      version: ${{ version }}
    build:
      script:
        - if: unix
          then: build-cli.sh
        - if: win
          then: build-cli.bat
    requirements:
      build:
        - ${{ compiler("go-nocgo") }}
        - go-licenses
        - nodejs >=20
    tests:
      - script:
          - nebi version
          - nebi --help
      - package_contents:
          bin:
            - nebi
          strict: true
    about:
      summary: Local-first workspace management for Pixi (CLI)
      description: |
        Nebi manages Pixi workspaces locally and syncs them to remote servers.
        It provides a CLI and embedded web UI for tracking, pushing, and pulling
        workspace configurations.

  - package:
      name: nebi
      version: ${{ version }}
    build:
      always_include_files:
        - if: unix
          then:
            - bin/nebi
            - bin/nebi-desktop
        - if: win
          then:
            - Library/bin/nebi.exe
            - Library/bin/nebi-desktop.exe
        - Menu/**
    requirements:
      host:
        - nebi-cli ==${{ version }}
        - nebi-desktop ==${{ version }}
      run:
        - nebi-cli ==${{ version }}
        - nebi-desktop ==${{ version }}
    tests:
      - script:
          - nebi version
          - nebi --help
      - script:
          - if: unix
            then:
              - test -f $PREFIX/bin/nebi-desktop
          - if: win
            then:
              - if exist %LIBRARY_BIN%\nebi-desktop.exe (exit 0) else (exit 1)
      - package_contents:
          bin:
            - nebi
            - nebi-desktop
          files:
            - Menu/nebi-desktop-menu.json
    about:
      summary: Nebi - local-first workspace management for Pixi (CLI + Desktop)
      license: Apache-2.0
      license_file:
        - src/LICENSE
      description: |
        Nebi manages Pixi workspaces locally and syncs them to remote servers.
        This package bundles both the CLI and desktop application, providing
        a graphical interface and command-line tools for tracking, pushing,
        and pulling workspace configurations.

about:
  homepage: https://github.com/nebari-dev/nebi
  summary: Local-first workspace management for Pixi
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://github.com/nebari-dev/nebi
  repository: https://github.com/nebari-dev/nebi

extra:
  recipe-maintainers:
    - Adam-D-Lewis
